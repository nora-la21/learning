<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dutch Vocabulary Helper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #1e1b2e;
      color: #f0eeff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 12px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #2d2a3e;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .toggle-label { font-size: 13px; font-weight: 600; }
    .toggle-sub   { font-size: 11px; color: #888; margin-top: 2px; }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #4b3a6b;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #7c3aed; }
    input:checked + .slider:before { transform: translateX(20px); }
    .status-row {
      background: #2d2a3e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status-row .label { color: #888; font-size: 11px; margin-bottom: 3px; }
    .status-ok  { color: #86efac; }
    .status-err { color: #fca5a5; }
    .open-app {
      display: block;
      width: 100%;
      padding: 9px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }
    .open-app:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <h1>🇳🇱 Dutch Vocabulary Helper</h1>

  <div class="toggle-row">
    <div>
      <div class="toggle-label" id="toggle-label">Popup enabled</div>
      <div class="toggle-sub">Select text to translate & save</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enabled-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status-row">
    <div class="label">App connection</div>
    <div id="status-text" class="status-ok">Checking…</div>
  </div>

  <a href="http://localhost:5173" target="_blank" class="open-app">Open Vocabulary App ↗</a>

  <script src="popup.js"></script>
</body>
</html>
