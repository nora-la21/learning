[build]
builder = "nixpacks"
buildCommand = "npm ci --prefix frontend && npm run build --prefix frontend && mkdir -p backend/static && cp -r frontend/dist/. backend/static/"

[deploy]
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
